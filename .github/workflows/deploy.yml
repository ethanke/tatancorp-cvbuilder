name: CI — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "10 6 * * *"  # daily at 06:10 UTC
  workflow_dispatch:

jobs:
  test:
    uses: ethanke/.github/.github/workflows/ci-nextjs.yml@main
    with:
      env-file: |
        OPENROUTER_API_KEY=fake_key_for_build
        NEXT_PUBLIC_BACKEND_URL=https://tatancorp.xyz/tatancorp-backend
        BACKEND_URL=https://tatancorp.xyz/tatancorp-backend
        NEXT_PUBLIC_APP_URL=https://cvbuilder.tatancorp.xyz
        NODE_ENV=production

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ethanke/.github/.github/workflows/deploy-nextjs.yml@main
    with:
      app-name: tatancorp-cvbuilder
      env-file: |
        NEXT_PUBLIC_APP_URL=https://cvbuilder.tatancorp.xyz
        NODE_ENV=production
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
      CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      ENV_SECRETS: |-
        OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
        NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
        BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

  report-failure:
    needs: [test, deploy]
    if: always() && (needs.test.result == 'failure' || needs.deploy.result == 'failure')
    uses: ethanke/.github/.github/workflows/report-failure.yml@main
    with:
      failed-job: ${{ needs.test.result == 'failure' && 'test' || 'deploy' }}
      fix-instructions: "Fix the failing CI. Run npm test and npm run build to reproduce. Check vitest test output and Next.js build errors. Push a fix to a new branch and open a PR."
    secrets:
      PERSO_GITHUB_TOKEN: ${{ secrets.PERSO_GITHUB_TOKEN }}
